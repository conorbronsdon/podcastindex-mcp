name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.19.x', '22.12.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  # Stable gate check that branch protection can require, independent of how
  # the matrix is named or how many legs it has. Bumping Node versions or
  # adding/removing matrix entries no longer requires touching branch
  # protection — only this single check is required to merge.
  tests-pass:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Verify all matrix legs succeeded
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Matrix test job result: ${{ needs.test.result }} (required: success)"
            exit 1
          fi
          echo "All matrix legs passed."
